<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service-Navigator — Küsters Grün.Stadt.Klima</title>
<meta name="description" content="KGSK Service-Navigator: Von der Systemauswahl über den Fördercheck bis zur Klimasimulation — der geführte Einstieg in Ihre Begrünungsmaßnahme.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── KGSK Design Tokens ─────────────────────────────────── */
:root {
  --dark:       #0F1923;
  --lime:       #A6D100;
  --lime-dark:  #7A9E00;
  --lime-hover: #6A8A00;
  --lime-pale:  #F4FADC;
  --blue:       #1E5FA8;
  --blue-pale:  #E4EEF9;
  --text:       #1E2B36;
  --muted:      #5A6672;
  --bg:         #F2F4F5;
  --white:      #FFFFFF;
  --border:     #DCE2E6;
  --shadow-sm:  0 1px 4px rgba(0,0,0,0.07);
  --shadow:     0 4px 16px rgba(0,0,0,0.10);
  --shadow-lg:  0 8px 32px rgba(0,0,0,0.14);
  --r:          10px;
  --r-sm:       6px;
  --r-lg:       16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

a { color: var(--blue); text-decoration: underline; text-underline-offset: 2px; }
a:hover { color: var(--dark); }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ── Header ─────────────────────────────────────────────── */
.site-header {
  background: var(--dark);
  position: sticky;
  top: 0;
  z-index: 100;
  height: 72px;
  padding: 0 40px;
  border-bottom: 2px solid var(--lime);
  display: flex;
  align-items: center;
  gap: 24px;
}

.logo-box {
  display: flex;
  flex-direction: column;
  background: var(--lime);
  padding: 5px 10px;
  border-radius: var(--r-sm);
  text-decoration: none;
  flex-shrink: 0;
  transition: background 0.15s ease;
}
.logo-box:hover { background: var(--lime-dark); }

.logo-name { font-size: 13px; font-weight: 800; color: var(--dark); letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.2; }
.logo-sub  { font-size: 9px; font-weight: 600; color: var(--dark); letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.75; line-height: 1.2; }

.header-tagline {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.02em;
  padding-left: 20px;
  border-left: 1px solid rgba(255,255,255,0.12);
  white-space: nowrap;
}

.header-spacer { flex: 1; }

.lang-toggle { display: flex; align-items: center; gap: 4px; }
.lang-btn {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  border: 1px solid transparent;
  color: rgba(255,255,255,0.4);
  background: transparent;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}
.lang-btn:hover { color: rgba(255,255,255,0.8); }
.lang-btn.active { background: var(--lime); color: var(--dark); border-color: var(--lime); }

/* ── Hero ────────────────────────────────────────────────── */
.pn-hero {
  background: var(--dark);
  padding: 72px 40px 80px;
  text-align: center;
  position: relative;
}
.pn-hero::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(166,209,0,0.4), transparent);
}

.pn-eyebrow {
  display: inline-block;
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--lime);
  margin-bottom: 16px;
}

.pn-title {
  font-size: 46px; font-weight: 800; line-height: 1.15;
  color: var(--white); margin-bottom: 20px;
  letter-spacing: -0.025em;
  max-width: 680px; margin-left: auto; margin-right: auto;
}

.pn-sub {
  font-size: 18px;
  color: rgba(255,255,255,0.58);
  max-width: 560px;
  margin: 0 auto;
  line-height: 1.7;
}

/* ── Main grid ───────────────────────────────────────────── */
.pn-main {
  max-width: 1080px;
  margin: 0 auto;
  padding: 52px 24px 80px;
  flex: 1;
}

.pn-section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.pn-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.pn-live-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-bottom: 12px;
}

.pn-enquiry-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
  margin-bottom: 48px;
}

/* ── Path card ───────────────────────────────────────────── */
.path-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
  transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.15s ease;
  text-align: left;
  position: relative;
}
.path-card:hover {
  border-color: var(--lime-dark);
  box-shadow: var(--shadow);
  transform: translateY(-2px);
}
.path-card.card-live { border-color: rgba(122,158,0,0.35); }
.path-card.card-live:hover { border-color: var(--lime-dark); }

.card-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 9px; border-radius: 50px;
  margin-bottom: 16px;
  width: fit-content;
}
.status-live     { background: rgba(122,158,0,0.14); color: var(--lime-dark); }
.status-enquiry  { background: var(--blue-pale);     color: var(--blue); }

.card-icon { font-size: 28px; line-height: 1; margin-bottom: 12px; }

.card-title {
  font-size: 16px; font-weight: 800; color: var(--dark);
  line-height: 1.25; margin-bottom: 10px; letter-spacing: -0.01em;
}

.card-desc {
  font-size: 13px; color: var(--muted);
  line-height: 1.6; flex: 1; margin-bottom: 22px;
}

.card-feature-list {
  list-style: none;
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.card-feature-list li {
  font-size: 12px; color: var(--text);
  display: flex; align-items: flex-start; gap: 7px;
  line-height: 1.45;
}
.card-feature-list li::before {
  content: '✓';
  font-size: 11px; font-weight: 700;
  color: var(--lime-dark);
  flex-shrink: 0;
  margin-top: 1px;
}

.card-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px; font-weight: 700;
  padding: 9px 16px;
  border-radius: var(--r-sm);
  text-decoration: none;
  transition: background 0.15s, color 0.15s, box-shadow 0.15s;
  width: fit-content;
  cursor: pointer;
  border: none;
  font-family: inherit;
}
.cta-primary {
  background: var(--lime-dark);
  color: var(--white);
}
.cta-primary:hover {
  background: var(--lime-hover);
  box-shadow: 0 2px 8px rgba(106,138,0,0.35);
  color: var(--white);
  text-decoration: none;
}
.cta-secondary {
  background: var(--lime-dark);
  color: var(--white);
}
.cta-secondary:hover {
  background: var(--lime-hover);
  box-shadow: 0 2px 8px rgba(106,138,0,0.35);
  color: var(--white);
  text-decoration: none;
}

/* ── Trust bar ───────────────────────────────────────────── */
.trust-bar {
  background: var(--dark);
  border-radius: var(--r-lg);
  padding: 28px 40px;
  display: flex;
  align-items: stretch;
  gap: 0;
  justify-content: space-around;
}

.trust-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 6px;
  padding: 0 24px;
}
.trust-item:not(:last-child) {
  border-right: 1px solid rgba(255,255,255,0.1);
}

.trust-icon { font-size: 22px; margin-bottom: 2px; }
.trust-label { font-size: 12px; color: rgba(255,255,255,0.45); font-weight: 500; line-height: 1.4; max-width: 120px; }
.trust-highlight { font-size: 11px; font-weight: 700; color: var(--lime); letter-spacing: 0.04em; }

/* ── Modal overlay ───────────────────────────────────────── */
.modal-overlay {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 100vh;
  background: rgba(15,25,35,0.72);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal-card {
  background: var(--white);
  border-radius: var(--r-lg);
  max-width: 520px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal-overlay.open .modal-card { transform: none; }

.modal-header {
  padding: 22px 26px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  position: sticky;
  top: 0;
  background: var(--white);
  z-index: 1;
  border-radius: var(--r-lg) var(--r-lg) 0 0;
}
.modal-header-text { flex: 1; }

.modal-service-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px; font-weight: 700; color: var(--blue);
  background: var(--blue-pale);
  padding: 3px 10px; border-radius: 50px;
  margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 0.08em;
}

.modal-title {
  font-size: 19px; font-weight: 800; color: var(--dark); line-height: 1.25;
}

.modal-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--muted);
  cursor: pointer; flex-shrink: 0;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--border); color: var(--dark); }

.modal-body { padding: 22px 26px 28px; }

/* Enquiry form */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 12px; font-weight: 600; color: var(--text);
  margin-bottom: 6px; letter-spacing: 0.02em;
}
.form-label .req { color: #C0392B; margin-left: 2px; }

.form-input,
.form-textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-family: inherit; font-size: 14px; color: var(--text);
  background: var(--white);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--lime-dark);
  box-shadow: 0 0 0 3px rgba(122,158,0,0.14);
}
.form-textarea { resize: vertical; min-height: 88px; line-height: 1.55; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.consent-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  margin-top: 4px;
}
.consent-check { display: flex; align-items: flex-start; gap: 10px; }
.consent-check input[type="checkbox"] { margin-top: 3px; accent-color: var(--lime-dark); flex-shrink: 0; }
.consent-check span { font-size: 12px; color: var(--muted); line-height: 1.5; }

.validation-msg {
  font-size: 12px; color: #C0392B;
  margin-top: 10px;
  display: none;
}
.validation-msg.visible { display: block; }

.btn-submit {
  width: 100%;
  padding: 13px 24px;
  background: var(--lime-dark); color: var(--white);
  border: none; border-radius: var(--r-sm);
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 16px;
  transition: background 0.15s, box-shadow 0.15s;
}
.btn-submit:hover { background: var(--lime-hover); box-shadow: 0 2px 10px rgba(106,138,0,0.35); }
.btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; box-shadow: none; }

/* Success / error states */
.form-state-success,
.form-state-error {
  display: none;
  text-align: center;
  padding: 32px 16px;
}
.form-state-success.visible,
.form-state-error.visible { display: block; }

.state-icon { font-size: 44px; margin-bottom: 16px; }
.state-title { font-size: 19px; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
.state-body { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }

.btn-close-modal {
  padding: 10px 24px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text);
  cursor: pointer;
  transition: background 0.15s;
}
.btn-close-modal:hover { background: var(--border); }

.fallback-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 16px;
}
.btn-fallback {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer;
  text-decoration: none;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.btn-fallback:hover { background: var(--border); color: var(--dark); text-decoration: none; }

/* ── Footer ──────────────────────────────────────────────── */
.site-footer {
  background: var(--dark);
  padding: 24px 40px;
  margin-top: auto;
}
.footer-inner {
  max-width: 1080px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.footer-brand { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); }
.footer-links { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.footer-links a { font-size: 12px; font-weight: 600; color: var(--lime); text-decoration: none; transition: color 0.15s; }
.footer-links a:hover { color: var(--lime-dark); }
.footer-disclaimer { width: 100%; font-size: 11px; color: rgba(255,255,255,0.22); line-height: 1.55; margin-top: 6px; }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 860px) {
  .pn-live-row    { grid-template-columns: 1fr; }
  .pn-enquiry-row { grid-template-columns: 1fr 1fr; }
  .trust-bar      { flex-wrap: wrap; justify-content: center; gap: 20px; padding: 22px 24px; }
  .trust-item     { border-right: none !important; padding: 0 16px; }
  .pn-title       { font-size: 34px; }
}

@media (max-width: 560px) {
  .site-header   { padding: 0 20px; }
  .header-tagline { display: none; }
  .pn-hero       { padding: 48px 20px 60px; }
  .pn-main       { padding: 32px 16px 60px; }
  .pn-title      { font-size: 28px; }
  .pn-sub        { font-size: 16px; }
  .pn-enquiry-row { grid-template-columns: 1fr; }
  .form-row      { grid-template-columns: 1fr; }
  .footer-inner  { flex-direction: column; align-items: flex-start; }
  .site-footer   { padding: 22px 20px; }
}
</style>
</head>
<body>

<!-- ══ HEADER ════════════════════════════════════════════ -->
<header class="site-header" role="banner">
  <a href="https://www.kgsk.de" class="logo-box" aria-label="KGSK Startseite">
    <div class="logo-name">KGSK</div>
    <div class="logo-sub">GRÜN.STADT.KLIMA</div>
  </a>
  <span class="header-tagline" id="hdr-tagline">Service-Navigator</span>
  <div class="header-spacer"></div>
  <div class="lang-toggle" role="group" aria-label="Sprache">
    <button class="lang-btn active" id="lang-de" data-lang="de" onclick="setHubLang('de')" aria-label="Deutsch">DE</button>
    <button class="lang-btn"        id="lang-en" data-lang="en" onclick="setHubLang('en')" aria-label="English">EN</button>
  </div>
</header>

<!-- ══ HERO ══════════════════════════════════════════════ -->
<section class="pn-hero" aria-labelledby="pn-hero-title">
  <p class="pn-eyebrow" id="pn-eyebrow"></p>
  <h1 class="pn-title" id="pn-hero-title"></h1>
  <p class="pn-sub"    id="pn-hero-sub"></p>
</section>

<!-- ══ MAIN ══════════════════════════════════════════════ -->
<main class="pn-main">
  <p class="pn-section-label" id="label-live"></p>
  <div class="pn-live-row" id="live-cards"></div>

  <p class="pn-section-label" id="label-enquiry" style="margin-top:32px;"></p>
  <div class="pn-enquiry-row" id="enquiry-cards"></div>

  <div class="trust-bar" role="region" aria-label="Kompetenzen">
    <div class="trust-item">
      <div class="trust-icon" aria-hidden="true">🌿</div>
      <div class="trust-highlight">Greenpass® zertifiziert</div>
      <div class="trust-label" id="trust-1-label"></div>
    </div>
    <div class="trust-item">
      <div class="trust-icon" aria-hidden="true">📄</div>
      <div class="trust-highlight" id="trust-2-val">3</div>
      <div class="trust-label" id="trust-2-label"></div>
    </div>
    <div class="trust-item">
      <div class="trust-icon" aria-hidden="true">🇪🇺</div>
      <div class="trust-highlight">EU Interreg DE-NL</div>
      <div class="trust-label" id="trust-3-label"></div>
    </div>
    <div class="trust-item">
      <div class="trust-icon" aria-hidden="true">🔬</div>
      <div class="trust-highlight" id="trust-4-val">2</div>
      <div class="trust-label" id="trust-4-label"></div>
    </div>
  </div>
</main>

<!-- ══ ENQUIRY MODAL ═════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-header-text">
        <div class="modal-service-tag" id="modal-service-tag"></div>
        <h2 class="modal-title" id="modal-title"></h2>
      </div>
      <button class="modal-close" onclick="closeModal()" aria-label="Schließen">✕</button>
    </div>
    <div class="modal-body">

      <!-- Enquiry form -->
      <form class="enquiry-form" id="enquiry-form" onsubmit="return false;" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="eq-name" id="lbl-name"></label>
            <input type="text"  class="form-input" id="eq-name"  autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-label" for="eq-email" id="lbl-email"></label>
            <input type="email" class="form-input" id="eq-email" autocomplete="email">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="eq-org" id="lbl-org"></label>
            <input type="text"  class="form-input" id="eq-org" autocomplete="organization">
          </div>
          <div class="form-group">
            <label class="form-label" for="eq-phone" id="lbl-phone"></label>
            <input type="tel"   class="form-input" id="eq-phone" autocomplete="tel">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="eq-message" id="lbl-message"></label>
          <textarea class="form-textarea" id="eq-message" rows="4"></textarea>
        </div>
        <div class="consent-block">
          <label class="consent-check">
            <input type="checkbox" id="eq-consent">
            <span id="lbl-consent"></span>
          </label>
        </div>
        <div class="validation-msg" id="eq-validation"></div>
        <button type="button" class="btn-submit" id="eq-submit" onclick="submitEnquiry()"></button>
      </form>

      <!-- Success state -->
      <div class="form-state-success" id="state-success">
        <div class="state-icon">✅</div>
        <h3 class="state-title" id="success-title"></h3>
        <p class="state-body"   id="success-body"></p>
        <button class="btn-close-modal" onclick="closeModal()" id="btn-success-close"></button>
      </div>

      <!-- Error / demo state -->
      <div class="form-state-error" id="state-error">
        <div class="state-icon" id="error-icon">⚠️</div>
        <h3 class="state-title" id="error-title"></h3>
        <p class="state-body"   id="error-body"></p>
        <div class="fallback-actions" id="fallback-actions" style="display:none;">
          <button class="btn-fallback btn-fallback-copy" id="btn-copy-enquiry" type="button" onclick="copyHubEnquiry()"></button>
          <a class="btn-fallback btn-fallback-mailto" id="btn-mailto-enquiry" href="#" target="_blank" rel="noopener noreferrer"></a>

function buildCard(svc) {
  var title    = hubLang === 'de' ? svc.title_de : svc.title_en;
  var desc     = hubLang === 'de' ? svc.desc_de  : svc.desc_en;
  var cta      = hubLang === 'de' ? svc.cta_de   : svc.cta_en;
  var features = svc.live ? (hubLang === 'de' ? svc.features_de : svc.features_en) : null;

  var statusClass = svc.live ? 'status-live' : 'status-enquiry';
  var statusText  = svc.live
    ? (hubLang === 'de' ? '● Verfügbar' : '● Available')
    : (hubLang === 'de' ? '◌ Anfrage'   : '◌ Enquiry');

  var ctaEl = '';
  if (svc.live) {
    ctaEl = '<a href="' + svc.url + '" class="card-cta cta-primary"' +
      ' onclick="trackCardClick(\'' + svc.id + '\',\'' + svc.url + '\')">' +
      cta + ' →</a>';
  } else {
    ctaEl = '<button class="card-cta cta-secondary" onclick="openEnquiry(\'' + svc.id + '\')">' +
      cta + ' →</button>';
  }

  var featureHtml = '';
  if (features && features.length) {
    featureHtml = '<ul class="card-feature-list">';
    for (var i = 0; i < features.length; i++) {
      featureHtml += '<li>' + features[i] + '</li>';
    }
    featureHtml += '</ul>';
  }

  return '<div class="path-card' + (svc.live ? ' card-live' : '') + '">' +
    '<span class="card-status ' + statusClass + '">' + statusText + '</span>' +
    '<div class="card-icon" aria-hidden="true">' + svc.icon + '</div>' +
    '<h3 class="card-title">' + title + '</h3>' +
    '<p class="card-desc">' + desc + '</p>' +
    featureHtml +
    ctaEl +
    '</div>';
}

function renderCards() {
  var liveEl    = document.getElementById('live-cards');
  var enquiryEl = document.getElementById('enquiry-cards');
  if (!liveEl || !enquiryEl) return;

  var liveHtml = '';
  var enquiryHtml = '';

  for (var i = 0; i < SERVICES.length; i++) {
    if (SERVICES[i].live) {
      liveHtml += buildCard(SERVICES[i]);
    } else {
      enquiryHtml += buildCard(SERVICES[i]);
    }
  }

  liveEl.innerHTML    = liveHtml;
  enquiryEl.innerHTML = enquiryHtml;
}

function openEnquiry(serviceId) {
  _activeService = null;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (window.KGSK_ANALYTICS) { KGSK_ANALYTICS.ctaClick('enquiry_open', serviceId); }
}

  if (valMsg) { valMsg.className = 'validation-msg'; valMsg.textContent = ''; }
  var s = document.getElementById('state-success');
  var e = document.getElementById('state-error');

/* ── Form submission ─────────────────────────────────────── */

var _lastEnquiryPayload = null;

function submitEnquiry() {
  var name    = (document.getElementById('eq-name')    || {}).value || '';
  var email   = (document.getElementById('eq-email')   || {}).value || '';
  var org     = (document.getElementById('eq-org')     || {}).value || '';
  var phone   = (document.getElementById('eq-phone')   || {}).value || '';
  var message = (document.getElementById('eq-message') || {}).value || '';
  var consent = (document.getElementById('eq-consent') || {}).checked || false;

  var valMsg = document.getElementById('eq-validation');

  if (!name.trim() || !email.trim() || !consent) {
    if (valMsg) { valMsg.textContent = hs('val_error'); valMsg.className = 'validation-msg visible'; }
    return;
  }
  if (valMsg) { valMsg.className = 'validation-msg'; }

  var submitBtn = document.getElementById('eq-submit');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = hubLang === 'de' ? 'Senden\u2026' : 'Sending\u2026'; }

  var serviceLabel = _activeService
    ? (hubLang === 'de' ? (_activeService.enquiry_context_de || _activeService.title_de) : (_activeService.enquiry_context_en || _activeService.title_en))
    : '';

  var payload = {
    source_type:   'hub_enquiry',
    service:       _activeService ? _activeService.id : '',
    service_label: serviceLabel,
    name:          name.trim(),
    email:         email.trim(),
    organisation:  org.trim(),
    phone:         phone.trim(),
    message:       message.trim(),
    lang:          hubLang,
    consent:       consent,
    ts:            new Date().toISOString(),
    page_url:      window.location.href
  };

  _lastEnquiryPayload = payload;

  if (window.KGSK_ANALYTICS) { KGSK_ANALYTICS.enquiryPrepared(_activeService ? _activeService.id : ''); }

  if (KGSK_ENQUIRY_ENDPOINT) {
    if (window.KGSK_ANALYTICS) { KGSK_ANALYTICS.directSendAttempt('hub_enquiry'); }
    fetch(KGSK_ENQUIRY_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(function(r) {
      if (r.ok) {
        if (window.KGSK_ANALYTICS) {
          KGSK_ANALYTICS.leadSubmit('enquiry', 0, _activeService ? _activeService.id : '');
          KGSK_ANALYTICS.directSendSuccess('hub_enquiry');
        }
        showFormState('success');
      } else {
        if (window.KGSK_ANALYTICS) { KGSK_ANALYTICS.directSendFailure('hub_enquiry', 'http_' + r.status); }
        showFormState('error');
      }
    })
    .catch(function() {
      if (window.KGSK_ANALYTICS) { KGSK_ANALYTICS.directSendFailure('hub_enquiry', 'network_error'); }
      showFormState('error');
    });
  } else {
    /* No endpoint — honest demo state */
    showFormState('demo');
  }
}

function buildHubMailtoHref(payload) {
  var isDE    = hubLang === 'de';
  var subject = encodeURIComponent(
    isDE ? ('KGSK Projektanfrage: ' + (payload.service_label || payload.service || ''))
         : ('KGSK Project Enquiry: ' + (payload.service_label || payload.service || ''))
  );
  var lines = [
    'Service: '      + (payload.service_label || payload.service || ''),
    'Name: '         + payload.name,
    'E-Mail: '       + payload.email,
    'Organisation: ' + (payload.organisation || ''),
    'Telefon: '      + (payload.phone || ''),
    '',
    isDE ? 'Nachricht:' : 'Message:',
    payload.message || '',
    '',
    (isDE ? 'Zeitpunkt: ' : 'Timestamp: ') + payload.ts
  ];
  return 'mailto:office@kgsk.de?subject=' + subject + '&body=' + encodeURIComponent(lines.join('\n'));
}

function copyHubEnquiry() {
  if (!_lastEnquiryPayload) return;
  var isDE = hubLang === 'de';
  var lines = [
    'Service: '      + (_lastEnquiryPayload.service_label || _lastEnquiryPayload.service || ''),
    'Name: '         + _lastEnquiryPayload.name,
    'E-Mail: '       + _lastEnquiryPayload.email,
    'Organisation: ' + (_lastEnquiryPayload.organisation || ''),
    'Telefon: '      + (_lastEnquiryPayload.phone || ''),
    '',
    isDE ? 'Nachricht:' : 'Message:',
    _lastEnquiryPayload.message || '',
    '',
    (isDE ? 'Zeitpunkt: ' : 'Timestamp: ') + _lastEnquiryPayload.ts
  ].join('\n');

  var btn = document.getElementById('btn-copy-enquiry');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lines).then(function() {
      if (btn) btn.textContent = isDE ? '\u2713 Kopiert' : '\u2713 Copied';
      if (window.KGSK_ANALYTICS) { KGSK_ANALYTICS.summaryCopy('hub_enquiry'); }
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = lines;
    ta.style.cssText = 'position:fixed;left:-9999px;top:0;';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (ex) {}
    document.body.removeChild(ta);
    if (btn) btn.textContent = isDE ? '\u2713 Kopiert' : '\u2713 Copied';
    if (window.KGSK_ANALYTICS) { KGSK_ANALYTICS.summaryCopy('hub_enquiry'); }
  }
}

function showFormState(state) {
  var form    = document.getElementById('enquiry-form');
  var stateOk = document.getElementById('state-success');
  var stateEr = document.getElementById('state-error');
  var fa      = document.getElementById('fallback-actions');

  if (form) form.style.display = 'none';

  if (state === 'success') {
    if (stateOk) stateOk.className = 'form-state-success visible';
    return;
  }

  /* error or demo — both show the error card */
  if (stateEr) stateEr.className = 'form-state-error visible';

  var iconEl  = document.getElementById('error-icon');
  var titleEl = document.getElementById('error-title');
  var bodyEl  = document.getElementById('error-body');

  if (state === 'demo') {
    if (iconEl)  iconEl.textContent  = 'i\uFE0F';
    if (titleEl) titleEl.textContent = hs('demo_title');
    if (bodyEl)  bodyEl.textContent  = hs('demo_body');
  }

  /* Wire up fallback buttons */
  if (fa && _lastEnquiryPayload) {
    fa.style.display = 'flex';
    var copyBtn   = document.getElementById('btn-copy-enquiry');
    var mailtoBtn = document.getElementById('btn-mailto-enquiry');
    if (copyBtn)   copyBtn.textContent  = hs('lbl_copy');
    if (mailtoBtn) {
      mailtoBtn.textContent = hs('lbl_mailto');
      mailtoBtn.href = buildHubMailtoHref(_lastEnquiryPayload);
      mailtoBtn.onclick = function() {
        if (window.KGSK_ANALYTICS) { KGSK_ANALYTICS.officialContactClick('hub_' + state); }
      };
    }
  }
}

    closeModal();
  }
});

/* ── Init ────────────────────────────────────────────────── */

document.addEventListener('DOMContentLoaded', function() {
  updateLangButtons();
  renderStrings();
  renderCards();
  renderModalStrings();
  if (window.KGSK_ANALYTICS) { KGSK_ANALYTICS.toolStart(hubLang); }
});
</script>

<script>
(function() {
  if (window.self === window.top) return;
  var _lastH      = 0;
  var _modalOpen  = false;
  var MODAL_BOOST = 520; /* extra px to guarantee modal is fully visible */

  function postHeight() {
    var base = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
    var h    = _modalOpen ? Math.max(base, base + MODAL_BOOST) : base;
    if (h === _lastH) return;
    _lastH = h;
    window.parent.postMessage({ type: 'kgsk_resize', height: h }, '*');
  }

  window.addEventListener('load', postHeight);
  window.addEventListener('resize', postHeight);
  if (window.MutationObserver) {
    new MutationObserver(postHeight).observe(document.body, { childList: true, subtree: true, attributes: true });
  }
  setInterval(postHeight, 800);

  /* Position modal overlay at the user's current viewport position */
  window.addEventListener('message', function(e) {
    if (!e.data || e.data.type !== 'kgsk_viewport_offset') return;
    var overlay = document.getElementById('modal-overlay');
    if (!overlay) return;
    overlay.style.top    = e.data.top + 'px';
    overlay.style.height = e.data.height + 'px';
  });

  /* Wrap openModal / closeModal to toggle height boost */
  var _origOpen  = window.openModal;
  var _origClose = window.closeModal;
  if (typeof _origOpen === 'function') {
    window.openModal = function() {
      _origOpen.apply(this, arguments);
      _modalOpen = true;
      postHeight();
    };
  }
  if (typeof _origClose === 'function') {
    window.closeModal = function() {
      _modalOpen = false;
      _origClose.apply(this, arguments);
      postHeight();
    };
  }
})();
</script>
